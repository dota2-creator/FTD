            const [bonusForm, setBonusForm] = useState({
                date: '',
                manager: '',
                comment: '',
                amount: ''
            });
            useEffect(() => {
                initializeMonthGoals(selectedMonth);
                const today = DateUtils.getTodayString();
                setPenaltyForm(prev => ({ ...prev, date: today }));
                setBonusForm(prev => ({ ...prev, date: today }));
            }, [selectedMonth, initializeMonthGoals]);
            const monthRecords = useMemo(() => 
                DateUtils.filterByMonth(records, selectedMonth), 
                [records, selectedMonth]
            );
            const monthPenalties = useMemo(() => 
                DateUtils.filterByMonth(penalties || [], selectedMonth), 
                [penalties, selectedMonth]
            );
            const monthBonuses = useMemo(() => 
                DateUtils.filterByMonth(bonuses || [], selectedMonth), 
                [bonuses, selectedMonth]
            );
            const goalsForMonth = monthlyGoals[selectedMonth] || {};
            const teamProgress = useMemo(
                () => Calculator.getTeamProgress(monthRecords, goalsForMonth, managers, selectedMonth, disabledAgents),
                [monthRecords, goalsForMonth, managers, selectedMonth, disabledAgents]
            );
            let progressClass = 'incomplete';
            if (teamProgress.progress === 100) progressClass = 'completed';
            else if (teamProgress.progress > 70) progressClass = 'partial';
            
            const handlePenaltySubmit = useCallback((e) => {
                e.preventDefault();
                const amountNum = parseFloat(penaltyForm.amount);
                if (!penaltyForm.manager) { addNotification('Выберите менеджера для штрафа', 'error'); return; }
                if (!penaltyForm.date) { addNotification('Выберите дату штрафа', 'error'); return; }
                if (!amountNum) { addNotification('Введите сумму штрафа', 'error'); return; }
                if (amountNum < 0) { addNotification('Внимание: Штраф с отрицательной суммой будет сохранен как положительный', 'warning'); }
                addPenalty({ ...penaltyForm, amount: amountNum });
                setPenaltyForm({ date: DateUtils.getTodayString(), manager: '', comment: '', amount: '' });
                addNotification('Штраф добавлен', 'success');
            }, [penaltyForm, addPenalty, addNotification]);
            
            const handleBonusSubmit = useCallback((e) => {
                e.preventDefault();
                const amountNum = parseFloat(bonusForm.amount);
                if (!bonusForm.manager) { addNotification('Выберите менеджера для бонуса', 'error'); return; }
                if (!bonusForm.date) { addNotification('Выберите дату бонуса', 'error'); return; }
                if (!amountNum) { addNotification('Введите сумму бонуса', 'error'); return; }
                if (amountNum < 0) { addNotification('Внимание: Бонус с отрицательной суммой будет сохранен как положительный', 'warning'); }
                addBonus({ ...bonusForm, amount: amountNum });
                setBonusForm({ date: DateUtils.getTodayString(), manager: '', comment: '', amount: '' });
                addNotification('Бонус добавлен', 'success');
            }, [bonusForm, addBonus, addNotification]);
            
            const goals = monthlyGoals[selectedMonth] || {};
            
            return (
                <div>
                    <MonthSelector 
                        label="Месяц:" 
                        value={selectedMonth} 
                        onChange={(e) => setSelectedMonth(e.target.value)} 
                    />
                        <div className="section">
                        <h3>🏆 Общий план команды за {DateUtils.formatMonthWithYear(selectedMonth)}</h3>
                        <div className="stats-grid">
                            <StatCard title="Общая цель" value={teamProgress.totalGoal} icon="🎯" />
                            <StatCard title="Валидные FTD" value={teamProgress.validDeposits} icon="✅" />
                            <StatCard title="Прогресс" value={`${teamProgress.progress}%`} icon="📈" />
                        </div>
                        <div className="progress-container">
                            <div 
                                className={`progress-bar ${progressClass}`} 
                                style={{width: `${MathUtils.clampProgress(teamProgress.progress)}%`}}
                            >
                                {teamProgress.progress}%
                            </div>
                        </div>
                    </div>
                    <div className="section">
                        <h3>👥 Планы менеджеров</h3>
                        <div style={CommonStyles.columnFlex}>
                            {useMemo(() => {
                                const activeManagers = getActiveManagersForMonth(selectedMonth);
                                let salesManagers = activeManagers.filter(m => m !== TEAM_LEADER_NAME);
                                if (managerFilter) {
                                    salesManagers = salesManagers.filter(m => m === managerFilter);
                                }
                                const managerValidCounts = {};
                                monthRecords.forEach(r => {
                                    if (r.validity === 'valid' && r.manager !== TEAM_LEADER_NAME) {
                                        managerValidCounts[r.manager] = (managerValidCounts[r.manager] || 0) + 1;
                                    }
                                });
                                return salesManagers.map(manager => (
                                    <ManagerProgress 
                                        key={manager} 
                                        manager={manager} 
                                        validCount={managerValidCounts[manager] || 0} 
                                        goal={goals[manager] || 0} 
                                        initialManagers={initialManagers} 
                                        monthlyGoals={goals}
                                        monthKey={selectedMonth}
                                        disabledAgents={disabledAgents}
                                    />
                                ));
                            }, [getActiveManagersForMonth, monthRecords, goals, initialManagers, selectedMonth, disabledAgents, managerFilter])}
                        </div>
                    </div>
                    {isAdmin && (
                    <div className="section">
                        <h3>⛔ Штрафы</h3>
                        <form onSubmit={handlePenaltySubmit}>
                            <div className="form-grid">
                                <div className="form-group">
                                    <label>Дата:</label>
                                    <input
                                        type="date"
                                        value={penaltyForm.date}
                                        onChange={(e) => setPenaltyForm({...penaltyForm, date: e.target.value})}
                                        required
                                    />
                                </div>
                                <div className="form-group">
                                    <label>Менеджер:</label>
                                    <select
                                        value={penaltyForm.manager}
                                        onChange={(e) => setPenaltyForm({...penaltyForm, manager: e.target.value})}
                                        required
                                    >
                                        <option value="">Выберите менеджера</option>
                                        {managers.map(m => <option key={m} value={m}>{m}</option>)}
                                    </select>
                                </div>
                                <div className="form-group">
                                    <label>Комментарий:</label>
                                    <input
                                        type="text"
                                        value={penaltyForm.comment}
                                        onChange={(e) => setPenaltyForm({...penaltyForm, comment: e.target.value})}
                                        placeholder="Причина штрафа"
                                    />
                                </div>
                                <div className="form-group">
                                    <label>Сумма ($):</label>
                                    <input
                                        type="number"
                                        value={penaltyForm.amount}
                                        onChange={(e) => setPenaltyForm({...penaltyForm, amount: e.target.value})}
                                        min="0"
                                        step="0.01"
                                        placeholder="50"
                                        required
                                    />
                                </div>
                            </div>
                            <button type="submit" className="btn btn-danger">Добавить штраф</button>
                        </form>
                        <div className="table-container" style={{marginTop: '1rem'}}>
                            <table className="table">
                                <thead>
                                    <tr>
                                        <th>Дата</th>
                                        <th>Менеджер</th>
                                        <th>Комментарий</th>
                                        <th>Сумма</th>
                                        <th>Действия</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {monthPenalties.map(p => (
                                        <tr key={p.id}>
                                            <td>{DateUtils.formatDateShort(p.date)}</td>
                                            <td>{p.manager}</td>
                                            <td>{p.comment}</td>
                                            <td>{FormatUtils.formatCurrency(-p.amount)}</td>
                                            <td>
                                                <button className="btn btn-danger btn-sm" onClick={() => deletePenalty(p.id)}>Удалить</button>
                                            </td>
                                        </tr>
                                    ))}
                                    {monthPenalties.length === 0 && (
                                        <tr><td colSpan="5" style={CommonStyles.centeredText}>Нет штрафов за этот месяц</td></tr>
                                    )}
                                </tbody>
                            </table>
                        </div>
                    </div>
                    )}
                    {isAdmin && (
                    <div className="section">
                        <h3>💰 Бонусы</h3>
                        <form onSubmit={handleBonusSubmit}>
                            <div className="form-grid">
                                <div className="form-group">
                                    <label>Дата:</label>
                                    <input
                                        type="date"
                                        value={bonusForm.date}
                                        onChange={(e) => setBonusForm({...bonusForm, date: e.target.value})}
                                        required
                                    />
                                </div>
                                <div className="form-group">
                                    <label>Менеджер:</label>
                                    <select
                                        value={bonusForm.manager}
                                        onChange={(e) => setBonusForm({...bonusForm, manager: e.target.value})}
                                        required
                                    >
                                        <option value="">Выберите менеджера</option>
                                        {managers.map(m => <option key={m} value={m}>{m}</option>)}
                                    </select>
                                </div>
                                <div className="form-group">
                                    <label>Комментарий:</label>
                                    <input
                                        type="text"
                                        value={bonusForm.comment}
                                        onChange={(e) => setBonusForm({...bonusForm, comment: e.target.value})}
                                        placeholder="Причина бонуса"
                                    />
                                </div>
                                <div className="form-group">
                                    <label>Сумма ($):</label>
                                    <input
                                        type="number"
                                        value={bonusForm.amount}
                                        onChange={(e) => setBonusForm({...bonusForm, amount: e.target.value})}
                                        min="0"
                                        step="0.01"
                                        placeholder="50"
                                        required
                                    />
                                </div>
                            </div>
                            <button type="submit" className="btn btn-primary">Добавить бонус</button>
                        </form>
                        <div className="table-container" style={{marginTop: '1rem'}}>
                            <table className="table">
                                <thead>
                                    <tr>
                                        <th>Дата</th>
                                        <th>Менеджер</th>
                                        <th>Комментарий</th>
                                        <th>Сумма</th>
                                        <th>Действия</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {monthBonuses.map(b => (
                                        <tr key={b.id}>
                                            <td>{DateUtils.formatDateShort(b.date)}</td>
                                            <td>{b.manager}</td>
                                            <td>{b.comment}</td>
                                            <td>{FormatUtils.formatCurrency(b.amount, { showSign: true })}</td>
                                            <td>
                                                <button className="btn btn-danger btn-sm" onClick={() => deleteBonus(b.id)}>Удалить</button>
                                            </td>
                                        </tr>
                                    ))}
                                    {monthBonuses.length === 0 && (
                                        <tr><td colSpan="5" style={CommonStyles.centeredText}>Нет бонусов за этот месяц</td></tr>
                                    )}
                                </tbody>
                            </table>
                        </div>
                    </div>
                    )}
                </div>
            );
        };
        const DataEntryTab = () => {
            const { records, managers, trafficOptions, countryOptions, addRecord, deleteRecord, initializeMonthGoals, disabledAgents } = useData();
            const { addNotification } = useNotification();
            const { isAdmin, userDisplayName } = useUser();
            const [form, setForm] = useState({
                date: '',
                manager: '',
                clientId: '',
                validity: '',
                invalidReason: '',
                traffic: trafficOptions[0],
                country: countryOptions[0],
                kus: '',
                leadColor: '',
                leadColorReasons: []
            });
            const [showKusInput, setShowKusInput] = useState(false);
            const [modalOpen, setModalOpen] = useState(false);
            const [deleteId, setDeleteId] = useState(null);
            const [selectedMonth, setSelectedMonth] = useSelectedMonth();
            const [clientSummary, setClientSummary] = useState('');
            
            // Кастомная валидация
            const [formErrors, setFormErrors] = useState({});
            const [touched, setTouched] = useState({});
            
            const fieldLabels = {
                date: 'Дата',
                manager: 'Менеджер',
                clientId: 'ID клиента',
                validity: 'Валидность',
                invalidReason: 'Причина невалидности',
                traffic: 'Трафик',
                country: 'Страна'
            };
            
            const validateField = useCallback((name, value) => {
                if (name === 'invalidReason') {
                    if (form.validity === 'invalid' && (!value || value === '')) {
                        return 'Пожалуйста, заполните поле "Причина невалидности"';
                    }
                    return null;
                }
                if (!value || value === '') {
                    return `Пожалуйста, заполните поле "${fieldLabels[name]}"`;
                }
                return null;
            }, [form.validity]);
            
            const handleFieldChange = useCallback((name, value) => {
                setForm(prev => {
                    const updated = { ...prev, [name]: value };
                    if (name === 'validity' && value !== 'invalid') {
                        updated.invalidReason = '';
                    }
                    return updated;
                });
                if (formErrors[name]) {
                    setFormErrors(prev => ({ ...prev, [name]: null }));
                }
                if (name === 'validity' && value !== 'invalid') {
                    setFormErrors(prev => ({ ...prev, invalidReason: null }));
                }
            }, [formErrors]);
            
            const handleFieldBlur = useCallback((name) => {
                setTouched(prev => ({ ...prev, [name]: true }));
                const error = validateField(name, form[name]);
                setFormErrors(prev => ({ ...prev, [name]: error }));
            }, [form, validateField]);
            
            const validateAllFields = useCallback(() => {
                const errors = {};
                let isValid = true;
                
                const fieldsToValidate = isAdmin 
                    ? ['date', 'manager', 'clientId', 'validity', 'traffic', 'country']
                    : ['date', 'manager', 'clientId', 'validity'];
                if (form.validity === 'invalid') {
                    fieldsToValidate.push('invalidReason');
                }
                
                fieldsToValidate.forEach(field => {
                    const error = validateField(field, form[field]);
                    if (error) {
                        errors[field] = error;
                        isValid = false;
                    }
                });
                
                setFormErrors(errors);
                const touchedFields = isAdmin 
                    ? { date: true, manager: true, clientId: true, validity: true, traffic: true, country: true }
                    : { date: true, manager: true, clientId: true, validity: true };
                if (form.validity === 'invalid') touchedFields.invalidReason = true;
                setTouched(touchedFields);
                return isValid;
            }, [form, validateField]);
            
            useEffect(() => {
                initializeMonthGoals(selectedMonth);
                setForm(prev => ({ ...prev, date: DateUtils.getTodayString() }));
            }, [selectedMonth, initializeMonthGoals]);
            
            useEffect(() => {
                if (!isAdmin && userDisplayName && managers.includes(userDisplayName)) {
                    setForm(prev => ({ ...prev, manager: userDisplayName }));
                }
            }, [isAdmin, userDisplayName, managers]);
            
            const monthRecords = useMemo(() => 
                DateUtils.filterByMonth(records, selectedMonth), 
                [records, selectedMonth]
            );
            const handleSubmit = useCallback((e) => {
                e.preventDefault();
                if (!validateAllFields()) {
                    addNotification('Пожалуйста, заполните все обязательные поля', 'warning');
                    return;
                }
                const validation = Validator.validateRecord(form);
                if (!validation.isValid) {
                    Object.values(validation.errors).forEach(err => addNotification(err, 'error'));
                    return;
                }
                addRecord(form);
                setForm({
                    date: DateUtils.getTodayString(),
                    manager: (!isAdmin && userDisplayName) ? userDisplayName : '',
                    clientId: '',
                    validity: '',
                    invalidReason: '',
                    traffic: trafficOptions[0],
                    country: countryOptions[0],
                    kus: '',
                    leadColor: '',
                    leadColorReasons: []
                });
                setShowKusInput(false);
                setFormErrors({});
                setTouched({});
                setClientSummary('');
                addNotification('Запись добавлена', 'success');
            }, [form, validateAllFields, addRecord, addNotification, trafficOptions, countryOptions, isAdmin, userDisplayName]);
            const handleDeleteClick = useCallback((id) => {
                setDeleteId(id);
                setModalOpen(true);
            }, []);
            const confirmDelete = useCallback(() => {
                deleteRecord(deleteId);
                setModalOpen(false);
                setDeleteId(null);
                addNotification('Запись удалена', 'success');
            }, [deleteId, deleteRecord, addNotification]);
            const closeModal = useCallback(() => {
                setModalOpen(false);
                setDeleteId(null);
            }, []);
            // Итоги недели
            const weekRange = useMemo(() => {
                const now = new Date();
                const dayOfWeek = now.getDay();
                const mondayOffset = dayOfWeek === 0 ? -6 : 1 - dayOfWeek;
                const monday = new Date(now);
                monday.setDate(now.getDate() + mondayOffset);
                monday.setHours(0, 0, 0, 0);
                const sunday = new Date(monday);
                sunday.setDate(monday.getDate() + 6);
                sunday.setHours(23, 59, 59, 999);
                const format = (d) => `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
                return { start: format(monday), end: format(sunday), startDate: monday, endDate: sunday };
            }, []);
            
            const weekStats = useMemo(() => {
                const weekRecords = records.filter(r => r.date >= weekRange.start && r.date <= weekRange.end);
                const total = weekRecords.length;
                const valid = weekRecords.filter(r => r.validity === 'valid').length;
                const invalid = weekRecords.filter(r => r.validity === 'invalid').length;
                const pending = weekRecords.filter(r => r.validity === 'pending').length;
                return { total, valid, invalid, pending };
            }, [records, weekRange]);
            
            const lastThreeRecords = useMemo(() => {
                return [...records].sort((a, b) => (b.id || 0) - (a.id || 0)).slice(0, 3);
            }, [records]);
            
            const validityLabel = (v) => {
                if (v === 'valid') return { text: 'Валидный', color: '#10b981' };
                if (v === 'invalid') return { text: 'Невалидный', color: '#ef4444' };
                if (v === 'pending') return { text: 'На рассмотрении', color: '#f59e0b' };
                if (v === 'not_transferred') return { text: 'Не переданный', color: '#9ca3af' };
                return { text: 'Не засчитано', color: '#6b7280' };
            };
            
            return (
                <div>
                    <MonthSelector 
                        label="Месяц для ввода данных:" 
                        value={selectedMonth} 
                        onChange={(e) => setSelectedMonth(e.target.value)} 
                    />

                    {/* Виджет "Итоги недели" */}
                    <div className="section animate-fade-in" style={{ marginBottom: '1rem', background: 'linear-gradient(135deg, rgba(79,70,229,0.07) 0%, rgba(16,185,129,0.07) 100%)', border: '1px solid rgba(79,70,229,0.15)', borderRadius: '12px', padding: '1rem 1.25rem' }}>
                        <div style={{ display: 'flex', alignItems: 'center', gap: '0.5rem', marginBottom: '0.75rem' }}>
                            <span style={{ fontSize: '1.2rem' }}>📈</span>
                            <h4 style={{ margin: 0, fontSize: '1rem', color: 'var(--primary)' }}>Итоги недели</h4>
                            <span style={{ fontSize: '0.75rem', color: 'var(--text-muted)', marginLeft: 'auto' }}>
                                {weekRange.startDate.toLocaleDateString('ru-RU', { day: '2-digit', month: '2-digit' })} — {weekRange.endDate.toLocaleDateString('ru-RU', { day: '2-digit', month: '2-digit' })}
                            </span>
                        </div>
                        <div style={{ display: 'flex', gap: '1rem', flexWrap: 'wrap', marginBottom: '1rem' }}>
                            <div style={{ flex: '1 1 120px', background: 'white', borderRadius: '10px', padding: '0.75rem', textAlign: 'center', boxShadow: '0 2px 8px rgba(0,0,0,0.06)', border: '1px solid var(--border)' }}>
                                <div style={{ fontSize: '1.5rem', fontWeight: '800', color: 'var(--primary)' }}>{weekStats.total}</div>
                                <div style={{ fontSize: '0.75rem', color: 'var(--text-muted)', marginTop: '2px' }}>Всего FTD</div>
                            </div>
                            <div style={{ flex: '1 1 120px', background: 'white', borderRadius: '10px', padding: '0.75rem', textAlign: 'center', boxShadow: '0 2px 8px rgba(0,0,0,0.06)', border: '1px solid #d1fae5' }}>
                                <div style={{ fontSize: '1.5rem', fontWeight: '800', color: '#10b981' }}>{weekStats.valid}</div>
                                <div style={{ fontSize: '0.75rem', color: 'var(--text-muted)', marginTop: '2px' }}>Валидных</div>
                            </div>
                            <div style={{ flex: '1 1 120px', background: 'white', borderRadius: '10px', padding: '0.75rem', textAlign: 'center', boxShadow: '0 2px 8px rgba(0,0,0,0.06)', border: '1px solid #fecaca' }}>
                                <div style={{ fontSize: '1.5rem', fontWeight: '800', color: '#ef4444' }}>{weekStats.invalid}</div>
                                <div style={{ fontSize: '0.75rem', color: 'var(--text-muted)', marginTop: '2px' }}>Невалидных</div>
                            </div>
                            <div style={{ flex: '1 1 120px', background: 'white', borderRadius: '10px', padding: '0.75rem', textAlign: 'center', boxShadow: '0 2px 8px rgba(0,0,0,0.06)', border: '1px solid #fef3c7' }}>
                                <div style={{ fontSize: '1.5rem', fontWeight: '800', color: '#f59e0b' }}>{weekStats.pending}</div>
                                <div style={{ fontSize: '0.75rem', color: 'var(--text-muted)', marginTop: '2px' }}>На рассмотрении</div>
                            </div>
                        </div>
                        
                        {weekStats.total > 0 && (
                            <div style={{ fontSize: '0.85rem', color: 'var(--text)', padding: '0.5rem 0.75rem', background: 'rgba(79,70,229,0.06)', borderRadius: '8px', fontWeight: '500' }}>
                                За эту неделю: <strong>{weekStats.total} FTD</strong> ({weekStats.valid} валидных)
                            </div>
                        )}
                        
                        {/* Живая лента: последние 3 записи */}
                        {lastThreeRecords.length > 0 && (
                            <div style={{ marginTop: '0.75rem' }}>
                                <div style={{ fontSize: '0.8rem', color: 'var(--text-muted)', marginBottom: '0.5rem', fontWeight: '600' }}>
                                    🕐 Последние записи:
                                </div>
                                <div style={{ display: 'flex', flexDirection: 'column', gap: '0.35rem' }}>
                                    {lastThreeRecords.map(r => {
                                        const vLabel = validityLabel(r.validity);
                                        return (
                                            <div key={r.id} style={{ 
                                                display: 'flex', 
                                                alignItems: 'center', 
                                                gap: '0.75rem', 
                                                background: 'white', 
                                                padding: '0.5rem 0.75rem', 
                                                borderRadius: '8px', 
                                                fontSize: '0.8rem',
                                                border: '1px solid var(--border)',
                                                boxShadow: '0 1px 3px rgba(0,0,0,0.04)'
                                            }}>
                                                {r.leadColor && LEAD_COLORS[r.leadColor] && (
                                                    <span style={{ width: '8px', height: '8px', borderRadius: '50%', background: LEAD_COLORS[r.leadColor].color, flexShrink: 0 }} title={`${LEAD_COLORS[r.leadColor].label}${r.leadColorReasons && r.leadColorReasons.length > 0 ? ': ' + r.leadColorReasons.join(', ') : ''}`} />
                                                )}
                                                <span style={{ color: 'var(--text-muted)', minWidth: '55px' }}>{DateUtils.formatDateShort(r.date)}</span>
                                                <span style={{ fontWeight: '600', minWidth: '100px', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{r.manager}</span>
                                                <span style={{ color: 'var(--text-muted)' }}>ID: {r.clientId}</span>
                                                <span style={{ marginLeft: 'auto', fontWeight: '600', color: vLabel.color, fontSize: '0.75rem' }}>{vLabel.text}</span>
                                                {r.validity === 'invalid' && r.invalidReason && (
                                                    <span style={{ fontSize: '0.7rem', color: '#ef4444', fontStyle: 'italic' }}>({r.invalidReason})</span>
                                                )}
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        )}
                    </div>

                    <div className="section" style={{ pointerEvents: 'auto' }}>
                        <h3>Добавить новую запись FTD за {DateUtils.formatMonthWithYear(selectedMonth)}</h3>

        const PlanCompletionHistory = ({ manager, records, monthlyGoals }) => {
            const history = useMemo(() => {
                // Месяц начала работы — только по записям (любая запись = человек уже работал).
                // monthlyGoals не используем: при initializeMonthGoals цели ставятся всем менеджерам за любой открытый месяц.
                const monthsWithRecords = [];
                records.filter(r => r.manager === manager).forEach(record => {
                    const date = new Date(record.date);
                    const monthKey = `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}`;
                    monthsWithRecords.push(monthKey);
                });
                const managerStartMonth = monthsWithRecords.length > 0
                    ? monthsWithRecords.sort()[0]
                    : null;

                if (!managerStartMonth) {
                    return [];
                }

                const monthsData = {};

                // Берём только месяцы >= месяца первой записи и только где есть план для этого менеджера
                Object.keys(monthlyGoals).forEach(monthKey => {
                    if (monthKey < managerStartMonth) return;
                    const goal = monthlyGoals[monthKey]?.[manager];
                    if (goal !== undefined && goal > 0) {
                        monthsData[monthKey] = { count: 0, monthKey, monthName: DateUtils.formatMonthWithYear(monthKey) };
                    }
                });

                // Добавляем депозиты по валидным записям, только с месяца начала
                records.filter(r => r.manager === manager && r.validity === 'valid').forEach(record => {
                    const date = new Date(record.date);
                    const monthKey = `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}`;
                    if (monthKey >= managerStartMonth && monthsData[monthKey] !== undefined) {
                        monthsData[monthKey].count++;
                    }
                });
                
                const history = Object.values(monthsData).map(monthData => {
                    const goal = monthlyGoals[monthData.monthKey]?.[manager] || 0;
                    const valid = monthData.count;
                    const progress = goal > 0 ? MathUtils.round((valid / goal) * 100) : 0;
                    const isCompleted = valid >= goal && goal > 0;
                    
                    return {
                        monthKey: monthData.monthKey,
                        monthName: monthData.monthName,
                        goal,
                        valid,
                        progress,
                        isCompleted
                    };
                });
                
                return history.sort((a, b) => b.monthKey.localeCompare(a.monthKey));
            }, [manager, records, monthlyGoals]);
            
            if (history.length === 0) {
                return (
                    <div style={{...CommonStyles.centeredText, padding: '1rem'}}>
                        Нет данных для отображения истории
                    </div>
                );
            }
            
            const completedCount = history.filter(h => h.isCompleted).length;
            const totalCount = history.length;
            const completionRate = totalCount > 0 ? MathUtils.round((completedCount / totalCount) * 100) : 0;
            
            return (
                <div>
                    <div style={{...CommonStyles.flexBetween, marginBottom: '1rem', padding: '0.75rem', background: 'rgba(79, 70, 229, 0.1)', borderRadius: '8px'}}>
                        <span style={{fontWeight: '600'}}>📊 Общая статистика выполнения планов:</span>
                        <span style={{fontWeight: '600', color: completionRate === 100 ? '#10b981' : completionRate >= 70 ? '#f59e0b' : '#ef4444'}}>
                            {completedCount}/{totalCount} выполнено ({completionRate}%)
                        </span>
                    </div>
                    <div style={CommonStyles.scrollableTable}>
                        <table style={CommonStyles.compactTable}>
                            <thead>
                                <tr style={CommonStyles.stickyTableHeader}>
                                    <th style={CommonStyles.tableHeaderCell}>Месяц</th>
                                    <th style={CommonStyles.tableHeaderCellCenter}>Цель</th>
                                    <th style={CommonStyles.tableHeaderCellCenter}>Факт</th>
                                    <th style={CommonStyles.tableHeaderCellCenter}>Прогресс</th>
                                    <th style={CommonStyles.tableHeaderCellCenter}>Статус</th>
                                </tr>
                            </thead>
                            <tbody>
                                {history.map((item, index) => (
                                    <tr 
                                        key={item.monthKey} 
                                        style={index % 2 === 0 ? CommonStyles.tableRowEven : CommonStyles.tableRowOdd}
                                    >
                                        <td style={CommonStyles.tableCellBold}>{item.monthName}</td>
                                        <td style={CommonStyles.tableCellCenter}>{item.goal || '-'}</td>
                                        <td style={CommonStyles.tableCellCenterBold}>{item.valid}</td>
                                        <td style={{...CommonStyles.tableCellCenterBold, color: ProgressUtils.getProgressColor(item.progress)}}>
                                            {item.progress}%
                                        </td>
                                        <td style={CommonStyles.tableCellCenter}>
                                            {item.isCompleted ? (
                                                <span style={{color: '#10b981', fontWeight: '700'}}>✅ Выполнено</span>
                                            ) : item.goal > 0 ? (
                                                <span style={{color: '#ef4444', fontWeight: '600'}}>❌ Не выполнено</span>
                                            ) : (
                                                <span style={{color: '#6b7280'}}>—</span>
                                            )}
                                        </td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        };
        
        // Калькулятор "Что если" — симуляция зарплаты
        const WhatIfCalculator = ({ 
            managers, 
            monthRecords, 
            monthPenalties, 
            monthBonuses,
            goals,
            plannedDays,
            selectedMonth,
            initialManagers,
            tariffs,
            invalidBonusPerFTD,
            teamLeaderPerFTD,
            teamPlanBonusAmount,
            managerBaseRates,
            managerTariffs,
            getWorkedDays,
            disabledAgents
        }) => {
            const { isAdmin, userDisplayName } = useUser();
            const [selectedManager, setSelectedManager] = useState('');
            const [additionalValidFTD, setAdditionalValidFTD] = useState(0);
            const [additionalInvalidFTD, setAdditionalInvalidFTD] = useState(0);
            const [additionalWorkedDays, setAdditionalWorkedDays] = useState(0);
            const [isExpanded, setIsExpanded] = useState(false);
            
            const salesManagers = useMemo(() => {
                let list = managers.filter(m => m !== TEAM_LEADER_NAME);
                if (!isAdmin && userDisplayName) {
                    list = list.filter(m => m === userDisplayName);
                }
                return list;
            }, [managers, isAdmin, userDisplayName]);
            
            useEffect(() => {
                if (!isAdmin && userDisplayName && salesManagers.includes(userDisplayName)) {
                    setSelectedManager(userDisplayName);
                }
            }, [isAdmin, userDisplayName, salesManagers]);
            
            // Текущие данные выбранного менеджера
            const currentData = useMemo(() => {
                if (!selectedManager) return null;
                
                const stats = Calculator.getManagerStats(monthRecords, selectedManager);
                const workedDays = getWorkedDays(selectedMonth, selectedManager);
                const goal = goals[selectedManager] || 0;
                const penaltiesSum = DataHelpers.calculatePenaltiesSum(monthPenalties, selectedManager);
                const bonusesSum = DataHelpers.calculateBonusesSum(monthBonuses, selectedManager);
                
                // Рассчитываем текущую зарплату
                const totalValid = Calculator.calculateStats(monthRecords).valid;
                const otherManagersValid = salesManagers
                    .filter(m => m !== selectedManager)
                    .map(m => ({ emp: m, valid: Calculator.getManagerStats(monthRecords, m).valid }));
                
                const salary = Calculator.calculateSalary({
                    validDeposits: stats.valid,
                    invalidDeposits: stats.invalid,
                    tariffs,
                    invalidBonusPerFTD,
                    plannedDays,
                    manager: selectedManager,
                    goals,
                    otherManagersValid,
                    teamLeaderPerFTD,
                    workedDays,
                    teamValidForBonus: 0,
                    penaltiesAmount: penaltiesSum,
                    teamPlanBonus: 0,
                    managerBonuses: bonusesSum,
                    managerBaseRates,
                    managerTariffs
                });
                
                const planBonus = Calculator.getBonusForGoal(goals, selectedManager, stats.valid, selectedMonth, disabledAgents);
                const totalWithBonus = salary.totalSalary + planBonus + bonusesSum;
                
                return {
                    stats,
                    workedDays,
                    goal,
                    penaltiesSum,
                    bonusesSum,
                    salary,
                    planBonus,
                    totalWithBonus,
                    otherManagersValid,
                    totalValid
                };
            }, [selectedManager, monthRecords, monthPenalties, monthBonuses, goals, selectedMonth, 
                tariffs, invalidBonusPerFTD, plannedDays, teamLeaderPerFTD, managerBaseRates, 
                managerTariffs, getWorkedDays, salesManagers, disabledAgents]);
            
            // Симулированные данные
            const simulatedData = useMemo(() => {
                if (!currentData || !selectedManager) return null;
                
                const simValidDeposits = currentData.stats.valid + additionalValidFTD;
                const simInvalidDeposits = currentData.stats.invalid + additionalInvalidFTD;
                const simWorkedDays = currentData.workedDays + additionalWorkedDays;
                
                const simSalary = Calculator.calculateSalary({
                    validDeposits: simValidDeposits,
                    invalidDeposits: simInvalidDeposits,
                    tariffs,
                    invalidBonusPerFTD,
                    plannedDays,
                    manager: selectedManager,
                    goals,
                    otherManagersValid: currentData.otherManagersValid,
                    teamLeaderPerFTD,
                    workedDays: simWorkedDays,
                    teamValidForBonus: 0,
                    penaltiesAmount: currentData.penaltiesSum,
                    teamPlanBonus: 0,
                    managerBonuses: currentData.bonusesSum,
                    managerBaseRates,
                    managerTariffs
                });
                
                const simPlanBonus = simValidDeposits >= currentData.goal && currentData.goal > 0 ? 100 : 0;
                const simTotalWithBonus = simSalary.totalSalary + simPlanBonus + currentData.bonusesSum;
                
                const difference = simTotalWithBonus - currentData.totalWithBonus;
                const percentChange = currentData.totalWithBonus > 0 
                    ? MathUtils.round((difference / currentData.totalWithBonus) * 100) 
                    : 0;
                
                return {
                    validDeposits: simValidDeposits,
                    invalidDeposits: simInvalidDeposits,
                    workedDays: simWorkedDays,
                    salary: simSalary,
                    planBonus: simPlanBonus,
                    totalWithBonus: simTotalWithBonus,
                    difference,
                    percentChange
                };
            }, [currentData, selectedManager, additionalValidFTD, additionalInvalidFTD, 
                additionalWorkedDays, tariffs, invalidBonusPerFTD, plannedDays, goals, 
                teamLeaderPerFTD, managerBaseRates, managerTariffs]);
            
            // Расчёт сколько FTD нужно до плана
            const ftdToGoal = useMemo(() => {
                if (!currentData) return null;
                const remaining = Math.max(0, currentData.goal - currentData.stats.valid);
                const daysLeft = Math.max(0, plannedDays - currentData.workedDays);
                const ftdPerDay = currentData.workedDays > 0 
                    ? (currentData.stats.valid / currentData.workedDays).toFixed(2) 
                    : 0;
                const daysNeeded = ftdPerDay > 0 
                    ? Math.ceil(remaining / ftdPerDay) 
                    : null;
                
                return { remaining, daysLeft, ftdPerDay, daysNeeded };
            }, [currentData, plannedDays]);
            
            // Сброс симуляции
            const resetSimulation = useCallback(() => {
                setAdditionalValidFTD(0);
                setAdditionalInvalidFTD(0);
                setAdditionalWorkedDays(0);

                    const totalDeposits = managerRecords.length;

                                            emp,

                                        const prevSalaryCalc = prevManagerData ? Calculator.calculateSalary({
                                            validDeposits: prevManagerData.valid,
                                            invalidDeposits: prevManagerData.invalid,
                                            tariffs,
                                            invalidBonusPerFTD,
                                            plannedDays: prevPlanned,
                                            manager,
                                            goals: prevGoals,
                                            otherManagersValid: prevOtherManagersValid,

                                            workedDays: prevWorked,

                                            penaltiesAmount: prevPenaltiesSum,
                                            teamPlanBonus: prevTeamPlanBonus,
                                            managerBonuses: prevManagerBonusesSum,
                                            managerBaseRates,
                                            managerTariffs

                                        const prevBonus = Calculator.getBonusForGoal(prevGoals, manager, prevManagerData ? prevManagerData.valid : 0, prevMonthKey, disabledAgents);
                                        const prevTotal = prevSalaryCalc.totalSalary + prevBonus + prevManagerBonusesSum;

                                                    <div><strong>Конверсия:</strong> {managerConversion}%</div>
                                                    <div><strong>Посещаемость:</strong> {FormatUtils.formatDays(workedDays)}/{plannedD}</div>
                                                    <div><strong>Итоговая ставка:</strong> {FormatUtils.formatCurrency(salary.adjustedBaseRate)}</div>
                                                    {penaltiesSum > 0 && <div><strong>Штрафы:</strong> {FormatUtils.formatCurrency(penaltiesSum)}</div>}
                                                    {bonus > 0 && <div><strong>Бонус за план:</strong> {FormatUtils.formatCurrency(100, { showSign: true })}</div>}
                                                    {teamPlanBonus > 0 && <div><strong>Бонус за общий план:</strong> {FormatUtils.formatCurrency(teamPlanBonus, { showSign: true })}</div>}
                                                    {managerBonuses > 0 && <div><strong>Дополнительные бонусы:</strong> {FormatUtils.formatCurrency(managerBonuses, { showSign: true })}</div>}
                                                    <div><strong>Итого:</strong> {FormatUtils.formatCurrency(totalWithBonus)}
                                                        {renderManagerDelta(deltaSalary)}
                                                    </div>
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            );
                        })
                    )}
                </div>
            );
        };
        
        const TeamLeaderSalaryTab = () => {
            const { records, bonuses, monthlyGoals, managers, initialManagers, plannedDays, getWorkedDays, attendance, updateAttendance } = useData();
            const { addNotification } = useNotification();
            const { isAdmin: isAdminUser } = useUser();
            const [selectedMonth, setSelectedMonth] = useSelectedMonth();
            const [isAuthorized, setIsAuthorized] = useState(() => {
                if (isAdminUser) return true;
                const stored = sessionStorage.getItem('teamLeaderSalaryAuthorized');
                return stored === 'true';
            });
            const [password, setPassword] = useState('');
            const [error, setError] = useState('');
            
            const monthRecords = useMemo(() => 
                DateUtils.filterByMonth(records, selectedMonth), 
                [records, selectedMonth]
            );
            
            const monthBonuses = useMemo(() => 
                DateUtils.filterByMonth(bonuses || [], selectedMonth), 
                [bonuses, selectedMonth]
            );
            
            const goals = monthlyGoals[selectedMonth] || {};
            const plannedD = plannedDays[selectedMonth] || 22;
            const workedDays = useMemo(() => {
                return getWorkedDays(selectedMonth, TEAM_LEADER_NAME);
            }, [selectedMonth, attendance, getWorkedDays]);
            
            // Данные для календаря посещаемости
            const [year, mon] = selectedMonth.split('-').map(Number);
            const monthStart = new Date(year, mon - 1, 1);
            const firstDayOfWeek = monthStart.getDay() || 7;
            const daysInMonth = new Date(year, mon, 0).getDate();
            const calendarDays = [];
            let currentDate = new Date(year, mon - 1, 1 - firstDayOfWeek + 1);
            for (let i = 0; i < 42; i++) {
                calendarDays.push(new Date(currentDate));
                currentDate.setDate(currentDate.getDate() + 1);
            }
            
            const handleDayClick = async (date, dayNum, currentValue) => {
                if (dayNum < 1 || dayNum > daysInMonth) return;
                const dateStr = `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`;
                
                let value = currentValue;
                if (value === true) value = 1;
                if (value === false || !value) value = 0;
                
                let newValue;
                let message;
                if (!value || value === 0) {
                    newValue = 0.5;
                    message = `День ${dayNum} отмечен как полдня`;
                } else if (value === 0.5) {
                    newValue = 1;
                    message = `День ${dayNum} отмечен как полный день`;
                } else {
                    newValue = undefined; 
                    message = `День ${dayNum} снят`;
                }
                
                await updateAttendance(selectedMonth, TEAM_LEADER_NAME, dateStr, newValue);
                addNotification(message, 'success');
            };
            
            const salaryData = useMemo(() => {
                if (!isAuthorized) return null;
                return TeamLeaderSalaryCalculator.calculateSalary({
                    records: monthRecords,
                    bonuses: monthBonuses,
                    managers,
                    initialManagers,
                    goals,
                    selectedMonth
                });
            }, [monthRecords, monthBonuses, managers, initialManagers, goals, selectedMonth, isAuthorized, workedDays]);
            
            const getCurrentPeriod = useMemo(() => {
                const now = new Date();
                const currentMonthKey = DateUtils.getCurrentMonthKey();
                
                if (selectedMonth !== currentMonthKey) {
                    return null;
                }
                
                const today = now.getDate();
                if (today >= 1 && today <= 10) return 1;
                if (today >= 11 && today <= 20) return 2;
                return 3;
            }, [selectedMonth]);
            
            const handlePasswordSubmit = async (e) => {
                e.preventDefault();
                setError('');
                
                const isValid = password === TEAM_LEADER_SALARY_PASSWORD;
                
                if (isValid) {
                    setIsAuthorized(true);
                    sessionStorage.setItem('teamLeaderSalaryAuthorized', 'true');
                    addNotification('Доступ разрешен', 'success');
                    setPassword('');
                } else {
                    setError('Неверный пароль');
                    addNotification('Неверный пароль', 'error');
                    setPassword('');
                }
            };
            
            const handleLogout = () => {
                setIsAuthorized(false);
                sessionStorage.removeItem('teamLeaderSalaryAuthorized');
                setPassword('');
                setError('');
            };
            
            if (!isAuthorized) {
                return (
                    <div style={{
                        display: 'flex',
                        justifyContent: 'center',
                        alignItems: 'center',
                        minHeight: '60vh',
                        padding: '2rem'
                    }}>

                            background: 'rgba(255, 255, 255, 0.05)',
                            backdropFilter: 'blur(10px)',
                            borderRadius: '16px',
                            padding: '2.5rem',
                            maxWidth: '400px',
                            width: '100%',
                            border: '1px solid rgba(255, 255, 255, 0.1)',
                            boxShadow: '0 8px 32px rgba(0, 0, 0, 0.1)'
                        }}>

                                    fontSize: '3rem',
                                    marginBottom: '1rem'

                                    color: 'var(--text)',
                                    fontSize: '1.5rem'
                                }}>Доступ ограничен</h3>
                                <p style={{
                                    color: 'var(--text-muted)',
                                    fontSize: '0.9rem',
                                    margin: 0
                                }}>Введите пароль для доступа к зарплате тим-лидера</p>
                            </div>
                            
                            <form onSubmit={handlePasswordSubmit}>
                                <div className="form-group">
                                    <label style={{
                                        display: 'block',
                                        marginBottom: '0.5rem',
                                        color: 'var(--text)',
                                        fontWeight: '500'
                                    }}>Пароль:</label>
                                    <input
                                        type="password"
                                        value={password}
                                        onChange={(e) => setPassword(e.target.value)}
                                        placeholder="Введите пароль"
                                        style={{
                                            width: '100%',
                                            padding: '0.75rem 1rem',
                                            background: 'rgba(255, 255, 255, 0.1)',
                                            border: `1px solid ${error ? 'rgba(239, 68, 68, 0.5)' : 'rgba(255, 255, 255, 0.2)'}`,
                                            borderRadius: '8px',
                                            color: 'var(--text)',
                                            fontSize: '1rem',
                                            outline: 'none',
                                            transition: 'all 0.3s ease'
                                        }}
                                        autoFocus
                                        required
                                    />
                                    {error && (
                                        <div style={{
                                            color: '#ef4444',
                                            fontSize: '0.85rem',
                                            marginTop: '0.5rem'
                                        }}>{error}</div>
                                    )}
                                </div>
                                
                                <button
                                    type="submit"
                                    className="btn btn-primary"
                                    style={{
                                        width: '100%',
                                        marginTop: '1rem',
                                        padding: '0.75rem'
                                    }}
                                >
                                    Войти
                                </button>
                            </form>
                        </div>
                    </div>
                );
            }
            
            if (!salaryData) {
                return null;
            }
            
            return (

                        ...CommonStyles.flexBetween,

                        marginBottom: '1rem',
                        padding: '0.75rem 1rem',

                        borderRadius: '8px',
                        border: '1px solid rgba(79, 70, 229, 0.3)'
                    }}>
                        <span style={{fontSize: '0.9rem', color: 'var(--text-muted)'}}>🔒 Доступ разрешен</span>
                        <button
                            onClick={handleLogout}
                            className="btn btn-secondary btn-sm"
                            style={{padding: '0.5rem 1rem', fontSize: '0.85rem'}}

                        border: 'none',

                        {/* Календарь посещаемости тим-лидера */}

                            backdropFilter: 'blur(10px)'

                            <div style={{
                                display: 'flex',
                                alignItems: 'center',
                                gap: '0.75rem',
                                marginBottom: '1.5rem'

                                <span style={{fontSize: '1.5rem'}}>📅</span>

                                    margin: 0,
                                    fontSize: '1.1rem',
                                    fontWeight: '700',
                                    color: 'var(--text)'
                                }}>Посещаемость тим-лидера</h5>

                                display: 'flex',
                                gap: '1rem',

                                        {FormatUtils.formatDays(workedDays)} / {plannedD}

                                        +{FormatUtils.formatDays(workedDays - plannedD)} переработка
                                    </div>
                                )}
                                {workedDays < plannedD && (
                                    <div style={{
                                        padding: '0.5rem 1rem',
                                        background: 'rgba(239, 68, 68, 0.2)',
                                        borderRadius: '8px',
                                        color: '#ef4444',
                                        fontWeight: '600',
                                        fontSize: '0.9rem'
                                    }}>
                                        -{FormatUtils.formatDays(plannedD - workedDays)} недоработка

                            <div className="attendance-calendar">

                                        <tr>
                                            <th>ПН</th><th>ВТ</th><th>СР</th><th>ЧТ</th><th>ПТ</th><th>СБ</th><th>ВС</th>

                                        {Array.from({length: 6}, (_, week) => (

                                                {Array.from({length: 7}, (_, dayIdx) => {
                                                    const date = calendarDays[week * 7 + dayIdx];
                                                    const dayNum = date.getDate();
                                                    const isCurrentMonth = date.getMonth() === mon - 1;
                                                    const dateStr = `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`;
                                                    let dayValue = attendance[selectedMonth]?.[TEAM_LEADER_NAME]?.[dateStr];

                                                        return <td key={dayIdx}>&nbsp;</td>;

                                                    let mark = '';
                                                    if (dayValue === 1) {
                                                        className += ' green';
                                                        mark = '🟢';
                                                    } else if (dayValue === 0.5) {
                                                        className += ' yellow';
                                                        mark = '🟡';

                                                        mark = '⚪';

            const [loadingProgress, setLoadingProgress] = useState(0);
            const [loadingStatusText, setLoadingStatusText] = useState('');

            const verifyCredentialsLocally = (user, pass) => {
                const loginKey = String(user || '').trim();
                if (loginKey === '1' && pass === '1') return false;
                const userRecord = users[loginKey];
                if (!userRecord) return false;
                return typeof userRecord === 'string' 
                    ? userRecord === pass 
                    : userRecord && userRecord.password === pass;
            };
            
            const handleSubmit = async (e) => {
                e.preventDefault();
                setError('');
                setIsSubmitting(true);
                
                await new Promise(resolve => setTimeout(resolve, 300));
                
                const loginKey = String(username || '').trim();
                const isPasswordValid = verifyCredentialsLocally(loginKey, password);
                
                if (isPasswordValid) {
                    login(loginKey);
                    setShowLoadingAnimation(true);

                        'Загрузка данных...',
                        'Инициализация системы...',
                        'Почти готово...'
                    ];
                    
                    for (let i = 0; i <= 100; i += 2) {
                        await new Promise(resolve => setTimeout(resolve, 30));
                        setLoadingProgress(i);
                        
                        if (i < 25) {
                            setLoadingStatusText(statusMessages[0]);
                        } else if (i < 50) {
                            setLoadingStatusText(statusMessages[1]);
                        } else if (i < 75) {
                            setLoadingStatusText(statusMessages[2]);
                        } else {
                            setLoadingStatusText(statusMessages[3]);
                        }
                    }
                    
                    await new Promise(resolve => setTimeout(resolve, 300));
                    setIsExiting(true);
                    await new Promise(resolve => setTimeout(resolve, 400));
                    onLogin(loginKey);
                } else {
                    setError('Неверный логин или пароль');
                    setIsSubmitting(false);
                }
            };
            
            if (showLoadingAnimation) {
                return <LoginLoadingAnimation progress={loadingProgress} statusText={loadingStatusText} />;

                                                required
                                                disabled={isSubmitting}
                                                className="glass-input-3d"
                                            />

                                            <div className="glass-input-line"></div>
                                        </div>
                                    </div>

                                        <div className="glass-input-container">

                                                placeholder=" "

                                                disabled={isSubmitting}

                            StorageUtils.getItem('userRole', 'user'),

                            StorageUtils.getItem('loginUsername', null)

                        setActiveTab(loadedActiveTab);
                        
                        const twoHours = 2 * 60 * 60 * 1000;
                        const loginKeyStored = savedLoginUsername != null ? String(savedLoginUsername).trim() : '';
                        const legacyAdminWithoutStoredLogin = !loginKeyStored && savedRole === 'admin';
                        const blockedLegacyLogin = loginKeyStored === '1';
                        
                        if (loggedIn && Date.now() - loginTime < twoHours && !blockedLegacyLogin && !legacyAdminWithoutStoredLogin) {
                            restoreRole(savedRole);
                            restoreDisplayName(savedDisplayName);
                            setIsLoggedIn(true);
                        } else {
                            await StorageUtils.removeItem('loggedIn');
                            await StorageUtils.removeItem('loginTime');
                            await StorageUtils.removeItem('userRole');
                            await StorageUtils.removeItem('userDisplayName');
                            await StorageUtils.removeItem('loginUsername');
                            setIsLoggedIn(false);

                    }

                loadAppData();

            useEffect(() => {
                if (isLoggedIn) {
                    const twoHours = 2 * 60 * 60 * 1000;

                        await StorageUtils.removeItem('loggedIn');
                        await StorageUtils.removeItem('loginTime');
                        await StorageUtils.removeItem('userRole');
                        await StorageUtils.removeItem('userDisplayName');
                        await StorageUtils.removeItem('loginUsername');
                        setIsLoggedIn(false);
                    }, twoHours);
                    return () => clearTimeout(timeout);
                }
            }, [isLoggedIn]);
            
            useEffect(() => {
                if (!isLoggedIn) return; 
                if (!tabs || tabs.length === 0) return;
                const tabExists = tabs.some(tab => tab.id === activeTab);
                if (!tabExists) {
                    setActiveTab(tabs[0].id);
                    StorageUtils.setItem('activeTab', tabs[0].id);

                const rec = users[signedInLogin];

                const displayForStorage = (rec && typeof rec === 'object' && rec.displayName)
                    ? rec.displayName
                    : signedInLogin;
                await StorageUtils.setItem('loggedIn', true);
                await StorageUtils.setItem('loginTime', Date.now());
                await StorageUtils.setItem('userRole', roleForStorage);
                await StorageUtils.setItem('userDisplayName', displayForStorage);
                await StorageUtils.setItem('loginUsername', signedInLogin);

                await StorageUtils.removeItem('loginTime');
                await StorageUtils.removeItem('userRole');

                            </div>
                            )}
                            <div style={{position: 'absolute', top: '1rem', right: '1rem', display: 'flex', alignItems: 'center', gap: '0.75rem'}}>

                                    borderRadius: '8px',
                                    fontSize: '0.8rem',
                                    fontWeight: '600',
                                    background: isAdmin ? 'rgba(239, 68, 68, 0.2)' : 'rgba(255, 255, 255, 0.2)',
                                    color: 'white',
                                    border: isAdmin ? '1px solid rgba(239, 68, 68, 0.5)' : '1px solid rgba(255, 255, 255, 0.3)'
                                }}>
                                    {isAdmin ? '👑 ' : '👤 '}{userDisplayName || (isAdmin ? 'Админ' : 'Пользователь')}
                                </span>
                                <button 
                                    className="btn btn-danger btn-animated active-scale" 
                                    onClick={handleLogout}
                                >
                                    <span className="icon-bounce">🚪</span> Выход
                                </button>
                            </div>
                        </div>
                        <div className="tabs">
                            {tabs.map(tab => (
                                <button
                                    key={tab.id}
                                    className={`tab active-scale ${activeTab === tab.id ? 'active' : ''}`}
                                    onClick={() => handleTabChange(tab.id)}
                                >
                                    {tab.label}
                                </button>
                            ))}
                        </div>
                        <div className="content">
                            <div className={`tab-content animate-fade-in ${activeTab ? 'active' : ''}`}>
                                <ActiveComponent />
                            </div>
                        </div>
                    </div>
                </div>
            );
        };
        try {
            const rootElement = document.getElementById('root');
            if (!rootElement) {
                throw new Error('Элемент root не найден');
            }
            
            ReactDOM.render(
                <ErrorBoundary>
                    <NotificationProvider>
                        <UserProvider>
                            <DataProvider>
                                <App />
                            </DataProvider>
                        </UserProvider>
                    </NotificationProvider>
                </ErrorBoundary>, 
                rootElement
            );
        } catch (error) {
            console.error('Ошибка инициализации React:', error);
        }
    </script>
</body>
</html>
